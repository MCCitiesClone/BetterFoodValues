# ========================================
# Better Food Values Configuration
# ========================================
# 
# This file allows you to customize the nutritional values of all food items in Minecraft.
# 
# Configuration Format:
# food_item_name:
#   food: <integer>        # Hunger points restored (0-20)
#   saturation: <float>    # Saturation points added
#   damage: <float>        # Damage dealt when consumed (0 = no damage)
#
# Notes:
# - Use the exact Minecraft material name (lowercase, underscores for spaces)
# - Food values are capped at 20 (full hunger bar)
# - Saturation values are also capped at 20
# - Damage is in half-hearts (1.0 = half heart, 2.0 = full heart)
# - Reload config with: /bfvreload
#
# ========================================

# ========================================
# FRUITS
# ========================================

