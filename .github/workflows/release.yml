name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

# Prevent overlapping releases from concurrent pushes.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need full history/tags to compute the next version

      - name: Compute next version
        id: version
        run: |
          set -euo pipefail
          # Latest semver tag of the form vX.Y.Z, if any.
          latest="$(git tag -l 'v*' --sort=-v:refname | head -n1)"
          if [ -z "$latest" ]; then
            # First release: seed from the fallback version in build.gradle.
            version="$(grep -oP "\?:\s*'\K[0-9]+\.[0-9]+\.[0-9]+" build.gradle)"
            version="${version:-0.1.0}"
          else
            # Bump the patch component of the latest tag.
            core="${latest#v}"
            major="${core%%.*}"
            rest="${core#*.}"
            minor="${rest%%.*}"
            patch="${rest#*.}"
            version="${major}.${minor}.$((patch + 1))"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"
          echo "Next version: ${version}"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build jar
        env:
          PLUGIN_VERSION: ${{ steps.version.outputs.version }}
        run: ./gradlew shadowJar --no-daemon

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: build/libs/BetterFoodValues-*.jar
